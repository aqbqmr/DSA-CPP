name: Publish Pattern Output

on:
  push:
    branches:
      - main
    paths:
      - "problems/pattern-printing/main.cpp"
      - "problems/pattern-printing/input.txt"
      - "scripts/run_pattern_printing.sh"
      - ".github/workflows/publish-pattern-output.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish-output:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate output
        run: bash scripts/run_pattern_printing.sh

      - name: Commit output if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/pattern-printing.txt outputs/README.txt
          if git diff --cached --quiet; then
            echo "No output changes to commit."
            exit 0
          fi
          git commit -m "chore: update PatternPrinting output"
          git push

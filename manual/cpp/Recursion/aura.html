<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura Mash</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    text-align:center;
    padding:30px;
}

h1{
    margin-bottom:40px;
}

.battle{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:50px;
}

.profile img{
    width:250px;
    height:250px;
    border-radius:50%;
    object-fit:cover;
    cursor:pointer;
    border:6px solid white;
    transition:0.3s;
}

.profile img:hover{
    transform:scale(1.05);
}

.or{
    font-size:40px;
    font-weight:bold;
}

.leaderboard{
    margin-top:60px;
}

table{
    margin:auto;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ddd;
    padding:12px 20px;
}

th{
    background:black;
    color:white;
}

#comparisons{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}

</style>

</head>
<body>

<h1>Who's pfp has more aura? Tap To Choose</h1>

<div class="battle">

    <div class="profile">
        <img id="leftImg">
    </div>

    <div class="or">OR</div>

    <div class="profile">
        <img id="rightImg">
    </div>

</div>

<div class="leaderboard">

    <h2>🏆 Leaderboard</h2>

    <br>

    <table>

        <thead>
            <tr>
                <th>Rank</th>
                <th>Name</th>
                <th>Aura Score</th>
            </tr>
        </thead>

        <tbody id="leaderboard">
        </tbody>

    </table>

    <h3 id="comparisons">
        Total Comparisons: 0
    </h3>

</div>

<script>

const users = [

{
    id:1,
    name:"Aaquib",
    image:"https://picsum.photos/300?1",
    score:1200
},

{
    id:2,
    name:"Ali",
    image:"https://picsum.photos/300?2",
    score:1200
},

{
    id:3,
    name:"Ahmed",
    image:"https://picsum.photos/300?3",
    score:1200
},

{
    id:4,
    name:"Zaid",
    image:"https://picsum.photos/300?4",
    score:1200
},

{
    id:5,
    name:"Umar",
    image:"https://picsum.photos/300?5",
    score:1200
}

];

let totalComparisons =
Number(localStorage.getItem("comparisons")) || 0;

let left;
let right;

function getBattle(){

    let a =
    Math.floor(Math.random()*users.length);

    let b;

    do{

        b =
        Math.floor(Math.random()*users.length);

    }while(a===b);

    left = users[a];
    right = users[b];

    document
    .getElementById("leftImg")
    .src = left.image;

    document
    .getElementById("rightImg")
    .src = right.image;
}

function updateLeaderboard(){

    const sorted =
    [...users].sort(
        (a,b)=>b.score-a.score
    );

    const board =
    document.getElementById("leaderboard");

    board.innerHTML = "";

    sorted.forEach((user,index)=>{

        board.innerHTML += `

        <tr>
            <td>${index+1}</td>
            <td>${user.name}</td>
            <td>${user.score}</td>
        </tr>

        `;

    });

}

function vote(winner,loser){

    winner.score += 10;
    loser.score -= 10;

    totalComparisons++;

    localStorage.setItem(
        "comparisons",
        totalComparisons
    );

    document
    .getElementById("comparisons")
    .innerText =
    `Total Comparisons: ${totalComparisons}`;

    updateLeaderboard();
    getBattle();
}

document
.getElementById("leftImg")
.addEventListener("click",()=>{

    vote(left,right);

});

document
.getElementById("rightImg")
.addEventListener("click",()=>{

    vote(right,left);

});

document
.getElementById("comparisons")
.innerText =
`Total Comparisons: ${totalComparisons}`;

updateLeaderboard();
getBattle();

</script>

</body>
</html>
